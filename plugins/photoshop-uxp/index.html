<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Adobe MCP Photoshop Bridge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <h1>Adobe MCP</h1>
        <div class="connection-status">
          <span id="connectionIndicator" class="indicator connecting"></span>
          <span id="connectionLabel">Connecting...</span>
        </div>
      </div>

      <section class="status">
        <pre id="statusText">Starting...</pre>
      </section>

      <div class="toolbar">
        <button id="stopBridge" class="btn-secondary">Stop</button>
        <button id="startBridge" class="btn-primary">Reconnect</button>
        <button id="advancedToggle" class="btn-text">Show Advanced</button>
      </div>

      <div id="advancedSection" class="advanced" style="display: none;">
        <label>
          <span>Bridge Base URL</span>
          <input id="bridgeUrl" type="text" value="http://127.0.0.1:47123/photoshop-bridge" />
        </label>

        <label>
          <span>Bridge Token</span>
          <input id="bridgeToken" type="password" value="" placeholder="Enter token from MCP server logs" />
        </label>

        <button id="saveConfig" class="btn-secondary">Save Config</button>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
